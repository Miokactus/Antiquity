l_english:
 ## ROMAN EMPIRE EVENTS ##

 rome_event.1.t: "The Death of the Emperor"
 rome_event.1.d: "So Augustus fell sick and died.\nLivia incurred some suspicion in connexion with his death, in view of the fact that he had secretly sailed over to the island to see Agrippa and seemed about to become completely reconciled with him.\nFor she was afraid, some say, that Augustus would bring him back to make him sovereign, and so smeared with poison some figs that were still on trees from which Augustus was wont to gather the fruit with his own hands; then she ate those that had not been smeared, offering the poisoned ones to him.\nAt any rate, from this or some other cause he became ill, and sending for his associates, he told them all his wishes, adding finally: \"I found Rome of clay; I leave it to you of marble.\"\nHe did not thereby refer literally to the appearance of its buildings, but rather to the strength of the empire. And by asking them for their applause, after the manner of the comic actors, as if at the close of a mime, he ridiculed most tellingly the whole life of man. Thus on the nineteenth day of August, the day on which he had first become consul, he passed away, having lived seventy-five years, ten months, and twenty-six days (he had been born on the twenty-third of September), and having been sole ruler, from the time of his victory at Actium forty-four years lacking thirteen days."
 rome_event.1.a: "The Gods have Spoken."
 rome_event.1.b: "Gloria!"

 rome_event.2.t: "Military coup d'Etat in Rome!"
 rome_event.2.d: "Reports coming from the Imperial Capital are worrying as a legio announced having restored order in the city after manifestations began."
 rome_event.2.a: "Pro Roma!"

 rome_event.3.t: "The Senate Restores the Republic!"
 rome_event.3.d: "The Senate have assumed control over common affairs. Following the rejecting of Augustus' will and Tiberius' nomination, the Senate had already declared its intention of reestablishing the old Republic. Today, this dream is no longer only a dream but a fact. The Republic is back, in all its glory, and for another milennia!"
 rome_event.3.a: "Gloria to the Republic!"

 rome_event.4.t: "The Senate is Dissolved!"
 rome_event.4.d: "Dissolved, democracy and event chain."
 rome_event.4.a: "Oligarchy no more!"
 
 rome_event.5.t: "The Client States declares Independence!"
 rome_event.5.d: "The main states under our protection have declared independence! Thus start the fall of our Empire."
 rome_event.5.a: "The Empire is Falling Apart!"




 rome_event.6.t: "The Grand Revolt (Anatolia and Carthage)"
 rome_event.6.d: ""
 rome_event.6.a: "Like a phenix, we rise again! (PLAY AS CARTHAGE)"
 rome_event.6.b: "Our turn! (PLAY AS ANATOLIA)"
 rome_event.6.c: "I never liked Carthage anyway."

 rome_event.7.t: "The Grand Revolt (Gaul and Hispania)"
 rome_event.7.d: ""
 rome_event.7.a: "Free, at last! (PLAY AS GAUL)"
 rome_event.7.b: "For the Empire! (PLAY AS HISPANIA)"
 rome_event.7.c: "Caesar would roll in his grave!"

 rome_event.8.t: "The Grand Revolt (Greece and Istria)"
 rome_event.8.d: ""
 rome_event.8.a: "Our path lies ahead. (PLAY AS ISTRIA)"
 rome_event.8.b: "Alexander shall rise again! (PLAY AS THE GREEK STATES)"
 rome_event.8.c: "Ungrateful bastards!"

 rome_event.9.t: "The Grand Revolt (Egypt)"
 rome_event.9.d: ""
 rome_event.9.a: "The Phareon Rises Again! (PLAY AS EGYPT)"
 rome_event.9.b: "Arg! The final blow!"

 rome_event.10.t: "The Grand Revolt (Rome and Austrian State)"
 rome_event.10.d: ""
 rome_event.10.a: "We will be back! (PLAY AS ROME)"
 rome_event.10.b: "A shame. (PLAY AS THE AUSTRIAN STATE)"




 rome_event.11.t: "The Fall of Rome!"
 rome_event.11.d: "Rome has fallen. In its ashes lies generals, rebellions, instability: rump states of a now-gone glorious past."
 rome_event.11.a: "The end of an Era."



 rome_event.12.t: "A Roman Deal: Carve up Armenia"
 rome_event.12.d: "An envoy from Rome arrived today at the Capital, with a deal.\n\They are asking us to put pression on Armenia to gain territories. We would get the eastern part of the country while Rome would get the eastern part and a de facto protectorate.\n\We cannot stand against Rome alone and they decided that even if we did not agree, they would attack Armenia and would get what they wanted, with or without us."
 rome_event.12.a: "Yes"
 rome_event.12.b: "Why not a compromise?"
 rome_event.12.c: "No!"

 rome_event.13.t: "A Roman Deal: Carve up Armenia, Yes!"
 rome_event.13.d: "The Arsacid agreed, finally Armenia is in our hands!"
 rome_event.13.a: "Armenia, finally!"
 rome_event.13.b: "We are doomed!"

 rome_event.14.t: "A Roman Deal: Carve up Armenia, A Compromise?"
 rome_event.14.d: "The Arsacid sent an envoy asking for a compromise. We would get the western part of Armenia and Sophene while they would get the eastern part of it. Armenia would be left alone, as a rump state."
 rome_event.14.a: "Why not."
 rome_event.14.b: "No! Who do you think we are?"
 rome_event.14.c: "It's better than nothing, I suppose.."

 rome_event.15.t: "A Roman Deal: Carve up Armenia, No!"
 rome_event.15.d: "The Arsacid refused, stating that they 'did not wish to engage in potential conflicts that could result in destabilising our nation'."
 rome_event.15.a: "Mobilise the Armies! With or without them, we'll get what we want!"
 rome_event.15.b: "Glory to Armenia!"


 rome_event.16.t: "A Roman Deal: Carve up the Arsacid"
 rome_event.16.d: ""
 rome_event.16.a: "Onwards! Mobilise the armies!"
 rome_event.16.b: "We can't risk our destruction!"

 rome_event.17.t: "A Roman Deal: Carve up the Arsacid, Yes!"
 rome_event.17.d: "Armenia agreed to help us in destroying the Arsacid 'Empire', once and for all. Our armies shall ride before each others!"
 rome_event.17.a: "To Ctesiphon!"

 rome_event.18.t: "A Roman Deal: Carve up the Arsacid, No!"
 rome_event.18.d: ""
 rome_event.18.a: "Arg! We'll need to.. do some shady things then."

 rome_event.102.t: "Strange Fellows from Far Away"
 rome_event.102.d: "Some people calling themselves \"Romans\" arrived today on our coasts. They said they wanted to meet our leader, and asked that we give tribute to them and pay respects. Obviously, we would have refused if it was only for that, but soon enough, armies arrived at our doors. What should we do?"
 rome_event.102.a: "We're basically forced to accept..."

 rome_event.103.t: "Letters from the North"
 rome_event.103.d: "The tribe we contacted answered our request: they paid tribute to our generals and are on their way to our capital, Rome. From now on, they will be our tributary and allies for our great conquest."
 rome_event.103.a: "Great! Send the armies!"

 rome_event.20.t: "The Jewish Issue"
 rome_event.20.d: "Reports from the region of Palestine are talking about a faith spreading across the eastern part of our territories. It is said that they are venerating only one God, creator of all, and that they do not venerate the Gods of Rome.\n\nWe always welcome new cultures and religion, which judaism is, but we should be careful at the spreading of this new faith, that does not integrate anything from ours."
 rome_event.20.a: "Tolerate the cult."
 rome_event.20.b: "Ban this cult!"

 rome_event.21.t: "Influx of Jews!"
 rome_event.21.d: "After the outlawing of jewish cults in the neighbouring Roman state, many so-called 'jews' or 'christians' began arriving at our border. Amongst them, many talked about a certain Christ, while other preached towards the Temple of Jerusalem.\n\nSome of these religious zelots even requested an audience with the King of Kings to ask for a possible future intervention against Rome in Palestine, with the goal of retaking the Temple and reforming a new kingdom of Judea, under the suzerainety of our country."
 rome_event.21.a: "Welcome them, for we are better than the romans."
 rome_event.21.b: "Let them at the doors; we can't take them."

 rome_event.22.t: "A Strange Fellow in Rome"
 rome_event.22.d: "After our measures taken against the cults of the east, many followers of judaism fled our country. In the wake of this exodus, a preacher arrived to the doors of Rome, asking to speak to a Senator.\n\nHe, who named himself 'Jesus, coming from Nazareth', asked for the help of Senators to protect his people, hoping that he would be heard. However, he did not find the audience he wanted, now wandering within Rome until he could depart."
 rome_event.22.a: "A strange fellow indeed."

 rome_event.23.t: "A Strange Fellow in Rome"
 rome_event.23.d: "This afternoon, a corpse was found around a little place in Rome. It seemed that it was the corpse of some sort of beggar, who seemed very thin and dehydrated. After investigation, some people heard that he was the aforementionned 'Jesus'.\n\nHe tried taking shelter from the night countless time without success, resorting to sleep outside and eating little to nothing for the past few days. He died in the cold."
 rome_event.23.a: "Who was he again?"

 rome_event.24.t: "News from Rome!"
 rome_event.24.d: "News from the roman capital are worrying: it seems like they found a corpse in the streets, and that, after investigations, it was a man known as Jesus.\n\nThe same man that many talked about when arriving in our country, seemed to now be dead."
 rome_event.24.a: "In honour of Jesus, we shall convert!"
 rome_event.24.b: "A sad day."
 rome_event.24.c: "Who?"





