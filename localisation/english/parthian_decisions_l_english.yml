 arsacid_event.23.t: "Treaty Port Purchase"
 arsacid_event.23.d: "An envoy from the Arsacid asked us if we would be willing to sell one of our port to them, as a lease. It could be beneficial in the short-term, but might become a problem later."
 arsacid_event.23.a: "Why not!"
 arsacid_event.23.b: "No thanks."



 arsacid_border_conflict.1.t: "Skirmishes in Syria!"
 arsacid_border_conflict.1.d: "The Arsacid won."
 arsacid_border_conflict.1.a: "We won!"
 arsacid_border_conflict.1.b: "A blow for our reputation."

 arsacid_border_conflict.2.t: "Skirmishes in Syria!"
 arsacid_border_conflict.2.d: "The Roman won!"
 arsacid_border_conflict.2.a: "We lost!"
 arsacid_border_conflict.2.b: "Rome wins again!"

