 ## EVENTS
 arsacid_event.1.t: "Call to War!"
 arsacid_event.1.a: "We shall defend our brothers!"
 arsacid_event.1.b: "Nope!"

 arsacid_event.2.t: "Call to War!"
 arsacid_event.2.a: "A good ally!"

 arsacid_event.3.t: "Call to War!"
 arsacid_event.3.a: "Okay."
 arsacid_event.3.b: "Ahaha.. I've only asked out of politeness."

 arsacid_event.4.t: "Request for Manpower"
 arsacid_event.4.a: "We can spare some."
 arsacid_event.4.b: "No, sorry."

 arsacid_event.5.t: "Rebellion!"
 arsacid_event.5.a: "Mobilise the armies!"
 arsacid_event.5.b: "Let's go for a.. diplomatic approach."

 arsacid_event.6.t: "Rebellion! (Diplomatic Way)"
 arsacid_event.6.a: "Ask for more freedom!"
 arsacid_event.6.b: "Ask for gifts and guarantees!"
 arsacid_event.6.c: "All for one!"

 arsacid_event.7.t: "Rebellion (Diplomatic Way)"
 arsacid_event.7.a: "Grant them more freedom but nothing more."
 arsacid_event.7.b: "Grant them gifts and guarantees but nothing more."
 arsacid_event.7.c: "Concede everything!"
 arsacid_event.7.d: "You're not the King of Kings here!"

 arsacid_event.8.t: "Start of the Rebellion!"
 arsacid_event.8.a: "Onwards!"

 arsacid_event.9.t: "Integration of §Y[FROM.GetName]§!"
 arsacid_event.9.d: "After an incredible amount of time, we have finally pacified the region and we'll be able to integrate it as soon as possible! The local populace are more than happy to join us. In addition, our authority will be reinforced in the region and nation-wide, so that maybe we'll be able to integrate more and more satraps and put an end to this era of separation!"
 arsacid_event.9.a: "Welcome!"

 arsacid_event.10.t: "Independence of the Eastern Satrapy!"
 arsacid_event.10.d: "The eastern satrapy has declared its independence from our rule!"
 arsacid_event.10.a: "There's nothing we can do about it."
 arsacid_event.10.b: "This means war!"

 arsacid_event.11.t: "Appeasement with Rome"
 arsacid_event.11.d: "An envoy from the Arsacid 'Empire' has arrived in Rome. They are asking for a treaty of friendship between our two countries, hoping that it could end the everlasting wars between us."
 arsacid_event.11.a: "Alright, for now."
 arsacid_event.11.b: "No."

 arsacid_event.12.t: "Skirmishes at the Border!"
 arsacid_event.12.d: "Reports coming from the east are bringing bad news: the Arsacid armies have begun attacking our positions in Syria, especially around Comagene! We need to defend this or we could very well lose!"
 arsacid_event.12.a: "Onwards!"

 arsacid_event.13.t: "Notice to the Satraps"
 arsacid_event.13.d: "The central government announced that it will tighten its grip on our territories."
 arsacid_event.13.a: "Alright."
 arsacid_event.13.b: "What? No!"

 arsacid_event.14.t: "Client King in Armenia?"
 arsacid_event.14.d: "Envoy from the Asracid:\n\"We humbly ask the Princeps of the Romans to recognise our claim on the Armenian throne, and with this the sovereignty of Artabanus II on the throne of the Arsacid Empire.\n\n- xoxo\""
 arsacid_event.14.a: "We'll recognise it."
 arsacid_event.14.b: "Who do you think we are?"

 arsacid_event.15.t: "Establish a Client King in Armenia!"
 arsacid_event.15.d: "Message from the Arsacid:\n\"Hallo! We will annex you and make of your country nothing but a little puppet. Thank you.\n\n- xoxo\""
 arsacid_event.15.a: "Glory to Artaxas III!"
 arsacid_event.15.b: "We will fight!"

 arsacid_event.16.t: "Establish a Client King in Armenia!"
 arsacid_event.16.d: "Message from Armenia:\n\"Hallo. No.\n\n- xoxo\""
 arsacid_event.16.a: "War it is!"
 arsacid_event.16.b: "We'll wait."

 arsacid_event.17.t: "Client King in Armenia?"
 arsacid_event.17.d: "Message from the Romans:\n\"Good day, sir.\nWe won't assist you. Actually, we support the current regime. Let's try another time shall we?\n\n- xoxo\""
 arsacid_event.17.a: "War!"
 arsacid_event.17.b: "Back down."

 arsacid_event.18.t: "Establish a Client King in Armenia!"
 arsacid_event.18.d: "Message from Armenia:\n\"We love our new king, please let us live! We aren't forced to write this under any menace.\n\nWith love,\""
 arsacid_event.18.a: "There's nothing we can do."
 arsacid_event.18.b: "Issue a diplomatic protest!"

 arsacid_event.19.t: "Submit to the Arsacid!"
 arsacid_event.19.d: "An envoy from the newly proclaimed 'Godly Empire' of the Arsacid dynasty has arrived to our capital: they are asking us to submit and convert to their new religion or they will crush us!"
 arsacid_event.19.a: "There's nothing we can do!"
 arsacid_event.19.b: "No?"

